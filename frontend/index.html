<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Các thẻ SEO này là GIÁ TRỊ MẶC ĐỊNH. JavaScript sẽ "thay ruột" chúng
       dựa trên from/to đọc từ URL (Programmatic SEO). -->
  <title>Convert Đa Năng Online — Chuyển đổi file miễn phí</title>
  <meta name="description" content="Công cụ chuyển đổi file trực tuyến miễn phí, nhanh chóng, an toàn và bảo mật." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="/" id="canonical" />

  <!-- Open Graph để chia sẻ mạng xã hội -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Convert Đa Năng Online" id="og-title" />
  <meta property="og:description" content="Chuyển đổi file trực tuyến miễn phí." id="og-desc" />

  <!-- Tailwind CSS qua CDN -> deploy tĩnh lên Cloudflare Pages / Netlify -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="w-full border-b border-slate-200 bg-white">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-2">
      <span class="text-2xl">🔄</span>
      <a href="/" class="font-bold text-lg text-slate-900">RustConvert</a>
      <span class="ml-auto text-sm text-slate-400">Miễn phí · Không cần đăng nhập</span>
    </div>
  </header>

  <!-- Nội dung chính -->
  <main class="flex-1 w-full max-w-3xl mx-auto px-4 py-10">
    <!-- H1 động (JS cập nhật) -->
    <h1 id="page-title" class="text-3xl md:text-4xl font-extrabold text-center text-slate-900">
      Convert Đa Năng Online
    </h1>
    <p id="page-subtitle" class="text-center text-slate-500 mt-3">
      Chọn cặp chuyển đổi qua đường dẫn, ví dụ: <code class="bg-slate-200 px-1 rounded">/wav-to-mp3</code>
    </p>

    <!-- Quota badge -->
    <p id="quota-info" class="text-center text-sm text-emerald-600 mt-4 font-medium"></p>

    <!-- Trang gốc (không có from/to): danh sách các công cụ để bấm chọn. Ẩn mặc định. -->
    <div id="picker" class="hidden"></div>

    <!-- Vùng Kéo & Thả -->
    <div id="dropzone"
      class="mt-8 border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center cursor-pointer
             bg-white hover:border-indigo-400 hover:bg-indigo-50/40 transition-colors">
      <input id="file-input" type="file" class="hidden" />
      <div class="text-5xl mb-3">📁</div>
      <p class="font-semibold text-slate-700">Kéo & thả file vào đây</p>
      <p class="text-sm text-slate-400 mt-1">hoặc bấm để chọn file (tối đa 50MB)</p>
      <p id="file-name" class="mt-4 text-indigo-600 font-medium"></p>
    </div>

    <!-- Nút Convert -->
    <button id="convert-btn"
      class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed
             text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
      <span id="btn-label">Convert</span>
      <!-- Vòng xoay loading (ẩn mặc định) -->
      <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
      </svg>
    </button>

    <!-- Thông báo trạng thái -->
    <p id="status" class="mt-4 text-center text-sm"></p>
  </main>

  <footer class="text-center text-xs text-slate-400 py-6">
    © 2026 RustConvert · Powered by Rust + Axum
  </footer>

  <script>
    // =====================================================================
    // CẤU HÌNH
    // =====================================================================
    const API_BASE = "http://localhost:3000"; // Đổi thành domain API thật khi deploy
    const DAILY_LIMIT = 5;                     // Giới hạn 5 lượt/ngày (No-Login)

    // Nhãn hiển thị đẹp cho từng định dạng.
    const LABELS = {
      wav: "WAV", flac: "FLAC", m4a: "M4A", mp4: "MP4", mov: "MOV", mkv: "MKV",
      mp3: "MP3", docx: "DOCX", xlsx: "XLSX", pptx: "PPTX", pdf: "PDF",
      png: "PNG", jpg: "JPG", jpeg: "JPEG", "app-icon": "Bộ App Icon"
    };

    // =====================================================================
    // 1. ĐỌC from/to TỪ URL (hỗ trợ cả path đẹp lẫn query params)
    // =====================================================================
    function parseRoute() {
      // Ưu tiên path dạng /wav-to-mp3 (tách theo "-to-" nên "png-to-app-icon" vẫn đúng).
      const path = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, ""));
      if (path.includes("-to-")) {
        const [from, to] = path.split("-to-");
        if (from && to) return { from, to };
      }
      // Dự phòng: query params ?from=wav&to=mp3 (dùng khi host tĩnh không rewrite).
      const q = new URLSearchParams(location.search);
      const from = q.get("from");
      const to = q.get("to");
      if (from && to) return { from, to };
      return null;
    }

    const route = parseRoute();

    // =====================================================================
    // 2. "THAY RUỘT" TOÀN BỘ THẺ SEO THEO from/to
    // =====================================================================
    function label(x) {
      return LABELS[x] || (x || "").toUpperCase();
    }

    function applySeo() {
      if (!route) return; // Trang gốc: giữ tiêu đề mặc định.
      const F = label(route.from);
      const T = label(route.to);

      const title = `Chuyển đổi ${F} sang ${T} trực tuyến miễn phí`;
      const desc = `Công cụ trực tuyến giúp bạn chuyển đổi file ${F} sang định dạng ${T} ` +
                   `nhanh chóng, an toàn, bảo mật và hoàn toàn miễn phí.`;

      document.title = title;
      document.querySelector('meta[name="description"]').setAttribute("content", desc);
      document.getElementById("og-title").setAttribute("content", title);
      document.getElementById("og-desc").setAttribute("content", desc);
      document.getElementById("canonical").setAttribute("href", location.href);

      document.getElementById("page-title").textContent = `Chuyển đổi ${F} sang ${T}`;
      document.getElementById("page-subtitle").innerHTML =
        `Kéo thả file <b>${F}</b> để chuyển sang <b>${T}</b> ngay bên dưới.`;

      // JSON-LD giúp Google hiểu đây là công cụ (WebApplication).
      const ld = document.createElement("script");
      ld.type = "application/ld+json";
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": title,
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0" }
      });
      document.head.appendChild(ld);
    }
    applySeo();

    // =====================================================================
    // 3. QUẢN LÝ LƯỢT DÙNG BẰNG LOCALSTORAGE (5 lượt/ngày, không cần login)
    // =====================================================================
    function today() {
      return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    }

    function getUsage() {
      try {
        const raw = JSON.parse(localStorage.getItem("rc_usage") || "{}");
        if (raw.date !== today()) return { date: today(), count: 0 }; // reset sang ngày mới
        return raw;
      } catch {
        return { date: today(), count: 0 };
      }
    }

    function remaining() {
      return Math.max(0, DAILY_LIMIT - getUsage().count);
    }

    function incUsage() {
      const u = getUsage();
      u.count += 1;
      localStorage.setItem("rc_usage", JSON.stringify(u));
    }

    // =====================================================================
    // 4. GIAO DIỆN & SỰ KIỆN
    // =====================================================================
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("file-input");
    const fileNameEl = document.getElementById("file-name");
    const convertBtn = document.getElementById("convert-btn");
    const btnLabel = document.getElementById("btn-label");
    const spinner = document.getElementById("spinner");
    const statusEl = document.getElementById("status");
    const quotaEl = document.getElementById("quota-info");

    let selectedFile = null;

    function setStatus(msg, type = "info") {
      const colors = { info: "text-slate-500", error: "text-red-600", success: "text-emerald-600" };
      statusEl.className = `mt-4 text-center text-sm ${colors[type]}`;
      statusEl.textContent = msg;
    }

    function refreshQuota() {
      const left = remaining();
      if (left <= 0) {
        quotaEl.textContent = "🔒 Bạn đã dùng hết 5 lượt miễn phí hôm nay, hãy quay lại vào ngày mai nhé!";
        quotaEl.className = "text-center text-sm text-red-600 mt-4 font-medium";
        convertBtn.disabled = true;
        btnLabel.textContent = "Đã hết lượt hôm nay";
      } else {
        quotaEl.textContent = `Bạn còn ${left}/${DAILY_LIMIT} lượt miễn phí hôm nay.`;
      }
    }
    refreshQuota();

    // Chọn file bằng click
    dropzone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => pickFile(fileInput.files[0]));

    // Drag & drop
    ["dragenter", "dragover"].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropzone.classList.add("border-indigo-500", "bg-indigo-50");
      })
    );
    ["dragleave", "drop"].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        dropzone.classList.remove("border-indigo-500", "bg-indigo-50");
      })
    );
    dropzone.addEventListener("drop", (e) => pickFile(e.dataTransfer.files[0]));

    function pickFile(file) {
      if (!file) return;
      if (file.size > 50 * 1024 * 1024) {
        setStatus("File vượt quá 50MB, vui lòng chọn file nhỏ hơn.", "error");
        return;
      }
      selectedFile = file;
      fileNameEl.textContent = `📄 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
      setStatus("");
    }

    // =====================================================================
    // 5. CONVERT: gửi file lên API, hiện loading, tự tải kết quả về
    // =====================================================================
    convertBtn.addEventListener("click", async () => {
      if (!route) {
        setStatus("Chưa xác định được cặp chuyển đổi từ URL (vd: /wav-to-mp3).", "error");
        return;
      }
      if (!selectedFile) {
        setStatus("Vui lòng chọn hoặc kéo thả file trước.", "error");
        return;
      }
      if (remaining() <= 0) {
        refreshQuota();
        return;
      }

      // Bật loading
      loading(true);
      setStatus("Đang tải lên và xử lý, vui lòng đợi...");

      try {
        const form = new FormData();
        form.append("from", route.from);
        form.append("to", route.to);
        form.append("file", selectedFile);

        const res = await fetch(`${API_BASE}/api/convert`, { method: "POST", body: form });

        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(text || `Lỗi máy chủ (${res.status})`);
        }

        // Nhận dữ liệu stream trả về dưới dạng Blob rồi tự động tải xuống.
        const blob = await res.blob();
        const filename = filenameFromHeader(res) || defaultName();
        triggerDownload(blob, filename);

        // Chỉ trừ lượt khi convert THÀNH CÔNG.
        incUsage();
        refreshQuota();
        setStatus("✅ Hoàn tất! File đã được tải xuống máy của bạn.", "success");
      } catch (err) {
        setStatus("❌ " + err.message, "error");
      } finally {
        loading(false);
      }
    });

    function loading(on) {
      convertBtn.disabled = on || remaining() <= 0;
      spinner.classList.toggle("hidden", !on);
      btnLabel.textContent = on ? "Đang xử lý..." : (remaining() <= 0 ? "Đã hết lượt hôm nay" : "Convert");
    }

    // Lấy tên file từ header Content-Disposition (backend đã expose header này).
    function filenameFromHeader(res) {
      const cd = res.headers.get("Content-Disposition");
      if (!cd) return null;
      const m = /filename="?([^"]+)"?/.exec(cd);
      return m ? m[1] : null;
    }

    // Tên file dự phòng nếu không đọc được header.
    function defaultName() {
      if (route.to === "app-icon") return "app-icons.zip";
      if (route.from === "pdf") return "converted-images.zip";
      return `converted.${route.to}`;
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // =====================================================================
    // 6. TRANG GỐC: nếu URL không có from/to, hiện lưới các công cụ để chọn
    //    (thay vì để nút Convert báo lỗi). Khớp đúng danh sách backend hỗ trợ.
    // =====================================================================
    const CONVERSIONS = [
      { from: "wav", to: "mp3" }, { from: "flac", to: "mp3" }, { from: "m4a", to: "mp3" },
      { from: "mp4", to: "mp3" }, { from: "mov", to: "mp3" }, { from: "mkv", to: "mp3" },
      { from: "docx", to: "pdf" }, { from: "xlsx", to: "pdf" }, { from: "pptx", to: "pdf" },
      { from: "pdf", to: "jpg" }, { from: "pdf", to: "png" },
      { from: "png", to: "app-icon" }, { from: "jpg", to: "app-icon" },
    ];

    function renderHome() {
      document.getElementById("page-title").textContent = "Convert Đa Năng Online";
      document.getElementById("page-subtitle").textContent = "Chọn một công cụ chuyển đổi bên dưới:";
      // Ẩn phần công cụ (chưa chọn cặp nào).
      dropzone.classList.add("hidden");
      convertBtn.classList.add("hidden");
      quotaEl.classList.add("hidden");
      // Dựng lưới link tới ?from=..&to=.. (chạy được trên mọi host tĩnh).
      const picker = document.getElementById("picker");
      picker.className = "mt-8 grid grid-cols-2 sm:grid-cols-3 gap-3";
      picker.innerHTML = CONVERSIONS.map((c) =>
        `<a href="?from=${c.from}&to=${c.to}"
            class="block rounded-xl border border-slate-200 bg-white px-4 py-3 text-center hover:border-indigo-400 hover:bg-indigo-50 transition-colors">
           <span class="font-semibold text-slate-800">${label(c.from)} → ${label(c.to)}</span>
         </a>`
      ).join("");
    }

    if (!route) renderHome();
  </script>
</body>
</html>
