<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="{{CANONICAL}}" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <header class="w-full border-b border-slate-200 bg-white">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-2">
      <span class="text-2xl">🔄</span>
      <a href="/" class="font-bold text-lg text-slate-900">RustConvert</a>
      <span class="ml-auto text-sm text-slate-400">Miễn phí · Không cần đăng nhập</span>
    </div>
  </header>

  <main class="flex-1 w-full max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl md:text-4xl font-extrabold text-center text-slate-900">Convert Đa Năng Online</h1>
    <p class="text-center text-slate-500 mt-3">
      Chọn một công cụ chuyển đổi bên dưới — tất cả đều miễn phí, không cần đăng nhập.
    </p>

    <!-- Lưới toàn bộ công cụ (sinh lúc build) -->
    <div class="mt-8 grid grid-cols-2 sm:grid-cols-3 gap-3">
      {{GRID}}
    </div>
  </main>

  <footer class="text-center text-xs text-slate-400 py-6">
    © 2026 RustConvert · Powered by Rust + Axum
  </footer>
</body>
</html>
